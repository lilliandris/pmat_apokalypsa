<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Prihlásenie · Hra na sústredenie</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <h1>Hra na sústredenie</h1>
    <p class="subtitle">Prihlás sa svojím účtom (vedúci alebo admin).</p>
    <form id="login-form">
      <div class="field">
        <label for="username">Používateľské meno</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Heslo</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%" id="submit-btn">Prihlásiť sa</button>
      <div class="msg error hidden" id="error-msg"></div>
    </form>
    <p style="margin-top:20px; font-size:0.85rem;">
      <a href="/live">→ Zobraziť verejnú live tabuľu bez prihlásenia</a>
    </p>
  </div>
</div>
<script src="/js/common.js"></script>
<script src="/js/login.js"></script>
</body>
</html>
